<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Tiger Bags</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">Tiger <span>Bags</span></a>
      <a href="shop.html" class="shop-btn">Continue Shopping</a>
    </nav>
  </header>

  <main class="auth-section">
    <div class="auth-box">
      <p class="auth-label">WELCOME BACK</p>
      <h1>Login to Your Account</h1>

      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email Address" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <p id="loginError" class="auth-message"></p>

      <p class="auth-switch">
        New customer? <a href="register.html">Create an account</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
