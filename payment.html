<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Tiger Bags</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <a href="index.html" class="logo">Tiger <span>Bags</span></a>
    </nav>
</header>

<section class="payment-section">

    <h1>Select Payment Method</h1>

    <form id="paymentForm">

        <label>
            <input type="radio" name="payment" value="Cash on Delivery" checked>
            Cash on Delivery
        </label>

        <label>
            <input type="radio" name="payment" value="UPI">
            UPI
        </label>

        <label>
            <input type="radio" name="payment" value="Debit / Credit Card">
            Debit / Credit Card
        </label>

        <label>
            <input type="radio" name="payment" value="Net Banking">
            Net Banking
        </label>

        <button type="submit">
            Place Order
        </button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
